# ── VaultCall — Configuration Mosquitto (broker MQTT sécurisé) ───────────────
#
# Ce fichier configure Mosquitto pour :
#   • Écouter sur le port 8883 en TLS 1.2+
#   • Exiger un certificat client (authentification mutuelle mTLS)
#   • Refuser les connexions non chiffrées
#
# Démarrage : mosquitto -c mosquitto.conf -v
# ─────────────────────────────────────────────────────────────────────────────

# Port TLS uniquement (désactiver le port 1883 non chiffré)
listener 8883

# Certificats
cafile   certs/ca.crt
certfile certs/server.crt
keyfile  certs/server.key

# Authentification mutuelle obligatoire
require_certificate true
use_identity_as_username true

# Version TLS minimale
tls_version tlsv1.2

# Persistence des messages
persistence true
persistence_location /tmp/mosquitto/

# Journalisation
log_type all
log_dest stdout
